<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL &mdash; My Account</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KERNL">
<meta name="theme-color" content="#1a1714">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script>window.__VERCEL_NO_TOOLBAR__ = true;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--success-bg:#e8f5ee;--success-fg:#2d6a4f;--error-bg:#fdf0f0;--error-fg:#8B1A1A;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a;--success-bg:#1a2e22;--success-fg:#5aab7a;--error-bg:#2e1a1a;--error-fg:#d4706f}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
#app{max-width:860px;margin:0 auto;padding:0 1.5rem 5rem}
.masthead{text-align:center;padding:2.5rem 0 2rem;position:relative;margin-bottom:2rem}
.masthead::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1;text-decoration:none;display:inline-block}
.logo-e{color:var(--accent)}
.tagline{font-size:0.8rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.4rem;font-weight:500}
.dark-toggle{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:6px;opacity:0.7}
.dark-toggle:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.dark-toggle-icon{font-size:0.85rem}
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
.nav-email{font-size:0.82rem;color:var(--muted)}
.nav-links{display:flex;gap:10px;align-items:center}
.nav-link{height:34px;padding:0 16px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--muted);cursor:pointer;text-decoration:none;display:flex;align-items:center;transition:all 0.2s}
.nav-link:hover{border-color:var(--accent-light);color:var(--accent)}
.nav-link.danger:hover{border-color:rgba(139,26,26,0.3);color:var(--error-fg)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;box-shadow:0 2px 16px rgba(139,69,19,0.06);transition:background var(--transition),border-color var(--transition)}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--ink);margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
.tier-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.tier-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:0.82rem;font-weight:500;letter-spacing:0.04em}
.tier-badge.free{background:var(--warm);color:var(--muted);border:1px solid var(--border)}
.tier-badge.pro{background:var(--accent);color:#fff;border:1px solid var(--accent)}
.tier-badge.pro::before{content:'★';font-size:0.75rem}
.upgrade-btn{height:38px;padding:0 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:background 0.2s;text-decoration:none;display:inline-flex;align-items:center}
.upgrade-btn:hover{background:var(--accent-light)}
.usage-bar-wrap{margin-top:1.25rem}
.usage-label{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);margin-bottom:8px}
.usage-label strong{color:var(--ink);font-weight:500}
.usage-bar{height:8px;background:var(--warm);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.usage-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.6s ease}
.usage-fill.warn{background:#c47a3a}
.usage-fill.full{background:var(--error-fg)}
.usage-reset{font-size:0.75rem;color:var(--muted);margin-top:8px;font-style:italic}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.25rem}
@media(max-width:480px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;transition:all var(--transition)}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600;color:var(--accent);line-height:1}
.stat-label{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.book-card{background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem;position:relative;overflow:hidden;transition:all 0.2s;cursor:pointer}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.book-card:hover{border-color:var(--accent-light);transform:translateY(-1px);box-shadow:0 4px 16px rgba(139,69,19,0.1)}
.book-card:hover::before{opacity:1}
.book-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:3px}
.book-author{font-size:0.78rem;color:var(--muted);margin-bottom:6px}
.book-synopsis{display:none;font-size:0.76rem;color:var(--muted);line-height:1.5;margin-top:6px;font-style:italic;border-top:1px solid var(--border);padding-top:6px}
.book-card:hover .book-synopsis{display:block}
.book-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.book-chip{font-size:0.68rem;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:10px;font-weight:500}
.book-chip.female{background:rgba(139,69,19,0.1);color:var(--accent)}
.book-chip.male{background:rgba(26,23,20,0.08);color:var(--muted)}
.book-date{font-size:0.7rem;color:var(--muted);opacity:0.7}
.book-remove{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:transparent;border:none;cursor:pointer;font-size:0.75rem;color:var(--muted);display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s}
.book-card:hover .book-remove{opacity:1}
.book-remove:hover{background:var(--error-bg);color:var(--error-fg)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.9rem;font-style:italic;border:1px dashed var(--border);border-radius:var(--radius-sm);background:var(--warm);opacity:0.7}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Reading Portrait card ─────────────────────────────────────────────────── */
.portrait-card{background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;box-shadow:0 2px 24px rgba(139,69,19,0.1);position:relative;overflow:hidden}
.portrait-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light),var(--accent))}
.portrait-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
.portrait-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--ink)}
.portrait-badge{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:10px;background:var(--accent-pale);color:var(--accent);font-weight:500;border:1px solid rgba(139,69,19,0.15)}
.portrait-text{font-size:0.95rem;line-height:1.75;color:var(--ink);font-style:italic;margin-bottom:1.5rem;padding:1rem 1.25rem;background:var(--warm);border-radius:var(--radius-sm);border-left:3px solid var(--accent)}
.portrait-recs-title{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:0.875rem}
.portrait-recs{display:flex;flex-direction:column;gap:10px}
.portrait-rec{display:flex;flex-direction:column;gap:3px;padding:0.875rem 1rem;background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s}
.portrait-rec:hover{border-color:var(--accent-light);transform:translateX(3px)}
.portrait-rec-title{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;color:var(--ink)}
.portrait-rec-author{font-size:0.75rem;color:var(--muted)}
.portrait-rec-reason{font-size:0.8rem;color:var(--accent);margin-top:4px;line-height:1.4;font-style:italic}
.portrait-refresh{margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.portrait-refresh-note{font-size:0.75rem;color:var(--muted);font-style:italic}
.portrait-refresh-btn{height:30px;padding:0 14px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.portrait-refresh-btn:hover{border-color:var(--accent-light);color:var(--accent)}
.portrait-loading{text-align:center;padding:2.5rem 1rem}
.portrait-loading-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--ink);margin-bottom:0.5rem}
.portrait-loading-sub{font-size:0.82rem;color:var(--muted)}
.portrait-teaser{text-align:center;padding:1.5rem;background:var(--warm);border-radius:var(--radius-sm);border:1px dashed var(--border)}
.portrait-teaser-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--ink);margin-bottom:0.5rem}
.portrait-teaser-sub{font-size:0.82rem;color:var(--muted);line-height:1.5}
.portrait-teaser-count{display:inline-block;margin-top:0.75rem;font-size:0.78rem;color:var(--accent);font-weight:500;letter-spacing:0.04em}
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">
      <span class="dark-toggle-icon" id="dark-icon">&#127769;</span>
      <span id="dark-label">Dark</span>
    </button>
    <a href="/" class="logo">K<span class="logo-e">E</span>RNL</a>
    <div class="tagline">for the curious</div>
  </div>

  <div class="nav-bar">
    <span class="nav-email" id="nav-email"></span>
    <div class="nav-links">
      <a href="/app.html" class="nav-link">&larr; Back to KERNL</a>
      <button class="nav-link danger" onclick="handleSignOut()">Sign Out</button>
    </div>
  </div>

  <!-- Account / tier card -->
  <div class="card" id="tier-card">
    <div class="loading"><span class="spinner"></span>Loading account&hellip;</div>
  </div>

  <!-- Reading Portrait card -->
  <div id="portrait-section"></div>

  <!-- My Library -->
  <div class="card">
    <div class="card-title">My Downloaded Books</div>
    <div id="library-container">
      <div class="loading"><span class="spinner"></span>Loading library&hellip;</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL     = 'https://peebgzfufyklxzdfnesc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZWJnemZ1ZnlrbHh6ZGZuZXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwNDEsImV4cCI6MjA5MDY5ODA0MX0.TXg5ztQsoGvE5j49GRRtaNdTIVM2jS1-LmMNzu7YA5g';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PORTRAIT_THRESHOLD = 5;

let _session = null;

// ── Dark mode ─────────────────────────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('kernl_dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === '1' || (saved === null && prefersDark)) document.documentElement.classList.add('dark');
  updateDarkToggle();
})();
function updateDarkToggle() {
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById('dark-icon').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
  document.getElementById('dark-label').textContent = isDark ? 'Light' : 'Dark';
}
function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('kernl_dark', isDark ? '1' : '0');
  updateDarkToggle();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { if (!ts) return ''; return new Date(ts).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); }

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  _session = session;
  const user = session.user;
  document.getElementById('nav-email').textContent = user.email;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  renderTierCard(profile);

  const { data: library } = await sb
    .from('user_library')
    .select('id, voice, language, added_at, summaries(title, author, synopsis)')
    .eq('user_id', user.id)
    .order('added_at', { ascending: false });

  const items = library || [];
  renderLibrary(items);
  renderPortraitSection(items);
}

// ── Tier card ─────────────────────────────────────────────────────────────────
function renderTierCard(profile) {
  const tier = profile ? profile.tier : 'free';
  const used = profile ? (profile.downloads_used || 0) : 0;
  const limit = tier === 'pro' ? 200 : 20;
  const remaining = Math.max(0, limit - used);
  const pct = Math.min(100, (used / limit) * 100);
  const resetDate = profile && profile.downloads_reset ? fmtDate(profile.downloads_reset) : null;
  const fillClass = pct >= 100 ? 'full' : pct >= 80 ? 'warn' : '';
  document.getElementById('tier-card').innerHTML = `
    <div class="card-title">Account</div>
    <div class="tier-row">
      <div>
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Current Plan</div>
        <span class="tier-badge ${tier}">${tier === 'pro' ? 'Pro &mdash; £20/year' : 'Free'}</span>
      </div>
      ${tier === 'free' ? '<a href="/upgrade.html" class="upgrade-btn">Upgrade to Pro &rsaquo;</a>' : ''}
    </div>
    <div class="usage-bar-wrap">
      <div class="usage-label"><span>Downloads used</span><strong>${used} / ${limit}</strong></div>
      <div class="usage-bar"><div class="usage-fill ${fillClass}" style="width:${pct}%"></div></div>
      ${resetDate ? `<div class="usage-reset">Resets on ${resetDate}</div>` : ''}
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-num">${used}</div><div class="stat-label">Downloaded</div></div>
      <div class="stat"><div class="stat-num">${remaining}</div><div class="stat-label">Remaining</div></div>
      <div class="stat"><div class="stat-num">${limit}</div><div class="stat-label">Annual Limit</div></div>
    </div>`;
}

// ── Reading Portrait ──────────────────────────────────────────────────────────
function renderPortraitSection(items) {
  const section = document.getElementById('portrait-section');
  const bookCount = items.length;

  if (bookCount < PORTRAIT_THRESHOLD) {
    // Show teaser
    const needed = PORTRAIT_THRESHOLD - bookCount;
    section.innerHTML = `
      <div class="portrait-card">
        <div class="portrait-header">
          <div class="portrait-title">Your Reading Portrait</div>
          <span class="portrait-badge">Coming soon</span>
        </div>
        <div class="portrait-teaser">
          <div class="portrait-teaser-title">A mirror for curious minds</div>
          <div class="portrait-teaser-sub">Save ${needed} more book${needed !== 1 ? 's' : ''} and KERNL will reflect back who you appear to be — your intellectual character, the themes you're drawn to, and three hand-picked recommendations that feel made for you.</div>
          <div class="portrait-teaser-count">${bookCount} of ${PORTRAIT_THRESHOLD} books saved</div>
        </div>
      </div>`;
    return;
  }

  // Show loading state while we fetch
  section.innerHTML = `
    <div class="portrait-card">
      <div class="portrait-header">
        <div class="portrait-title">Your Reading Portrait</div>
        <span class="portrait-badge">Personalised</span>
      </div>
      <div class="portrait-loading">
        <div class="portrait-loading-title"><span class="spinner"></span>Reading your library&hellip;</div>
        <div class="portrait-loading-sub">Composing your portrait</div>
      </div>
    </div>`;

  loadPortrait(false);
}

async function loadPortrait(forceRefresh) {
  const section = document.getElementById('portrait-section');
  if (!_session) return;

  try {
    const res = await fetch('/api/generate-portrait', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + _session.access_token
      },
      body: JSON.stringify({ forceRefresh: !!forceRefresh })
    });

    if (!res.ok) throw new Error('Portrait generation failed');
    const data = await res.json();

    if (!data.portrait) return; // not enough books — shouldn't happen here

    renderPortrait(data);
  } catch(e) {
    console.warn('Portrait error:', e.message);
    section.innerHTML = `
      <div class="portrait-card">
        <div class="portrait-header">
          <div class="portrait-title">Your Reading Portrait</div>
          <span class="portrait-badge">Personalised</span>
        </div>
        <div class="portrait-teaser">
          <div class="portrait-teaser-sub" style="color:var(--muted)">Could not load your portrait right now. Try again shortly.</div>
        </div>
      </div>`;
  }
}

function renderPortrait(data) {
  const section = document.getElementById('portrait-section');
  const recs = (data.recommendations || []);

  const recsHtml = recs.map(r => `
    <div class="portrait-rec" onclick="openBook('${esc(r.title)}','${esc(r.author)}')">
      <div class="portrait-rec-title">${esc(r.title)}</div>
      <div class="portrait-rec-author">by ${esc(r.author)}</div>
      <div class="portrait-rec-reason">${esc(r.reason)}</div>
    </div>`).join('');

  section.innerHTML = `
    <div class="portrait-card">
      <div class="portrait-header">
        <div class="portrait-title">Your Reading Portrait</div>
        <span class="portrait-badge">Personalised</span>
      </div>
      <div class="portrait-text">${esc(data.portrait)}</div>
      ${recs.length ? `
        <div class="portrait-recs-title">Recommended for you</div>
        <div class="portrait-recs">${recsHtml}</div>` : ''}
      <div class="portrait-refresh">
        <div class="portrait-refresh-note">Based on ${data.bookCount} book${data.bookCount !== 1 ? 's' : ''} &mdash; refreshes as your library grows</div>
        <button class="portrait-refresh-btn" onclick="refreshPortrait()">Refresh portrait</button>
      </div>
    </div>`;
}

async function refreshPortrait() {
  const section = document.getElementById('portrait-section');
  section.querySelector('.portrait-card').innerHTML = `
    <div class="portrait-header" style="margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--ink)">Your Reading Portrait</div>
      <span class="portrait-badge">Personalised</span>
    </div>
    <div class="portrait-loading">
      <div class="portrait-loading-title"><span class="spinner"></span>Refreshing your portrait&hellip;</div>
      <div class="portrait-loading-sub">This takes a moment</div>
    </div>`;
  await loadPortrait(true);
}

// ── Library ───────────────────────────────────────────────────────────────────
function renderLibrary(items) {
  const container = document.getElementById('library-container');
  if (!items.length) {
    container.innerHTML = '<div class="empty">Your library is empty &mdash; download a book summary from KERNL to see it here.</div>';
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'library-grid';
  items.forEach(item => {
    const title    = item.summaries ? item.summaries.title  || '' : '';
    const author   = item.summaries ? item.summaries.author || '' : '';
    const synopsis = item.summaries ? item.summaries.synopsis || '' : '';
    const voice    = item.voice || 'female';
    const lang     = (item.language || 'en').toUpperCase();
    const card     = document.createElement('div');
    card.className = 'book-card';
    card.dataset.title  = title;
    card.dataset.author = author;
    card.dataset.id     = item.id;
    card.innerHTML = `
      <button class="book-remove" title="Remove">&times;</button>
      <div class="book-title">${esc(title)}</div>
      <div class="book-author">by ${esc(author)}</div>
      ${synopsis ? `<div class="book-synopsis">${esc(synopsis)}</div>` : ''}
      <div class="book-meta">
        <span class="book-chip ${voice}">${voice === 'female' ? '&#9792; Female' : '&#9794; Male'} &middot; ${lang}</span>
        <span class="book-date">${fmtDate(item.added_at)}</span>
      </div>`;
    card.addEventListener('click', function(e) {
      if (e.target.classList.contains('book-remove')) return;
      openBook(this.dataset.title, this.dataset.author);
    });
    card.querySelector('.book-remove').addEventListener('click', function(e) {
      e.stopPropagation();
      removeFromLibrary(card.dataset.id);
    });
    grid.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(grid);
}

function openBook(title, author) {
  if (!title) return;
  window.location.href = '/app.html?title=' + encodeURIComponent(title) + '&author=' + encodeURIComponent(author);
}

async function removeFromLibrary(id) {
  if (!confirm('Remove this book from your library? This will not affect your download count.')) return;
  await sb.from('user_library').delete().eq('id', id);
  init();
}

async function handleSignOut() { await sb.auth.signOut(); window.location.href = '/login.html'; }

init();
</script>
</body>
</html>
