<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL Library — for the curious</title>
<meta name="description" content="Explore our free sample library of book summaries.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
#app{max-width:1100px;margin:0 auto;padding:0 1.5rem 5rem}

/* Header */
.masthead{text-align:center;padding:3rem 0 2rem;position:relative;margin-bottom:2rem}
.masthead::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.2rem);font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1}
.logo-e{color:var(--accent)}
.tagline{font-size:0.85rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.5rem;font-weight:500}
.library-subtitle{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:var(--muted);margin-top:0.75rem}
.dark-toggle{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:6px;opacity:0.7}
.dark-toggle:hover{opacity:1;border-color:var(--accent);color:var(--accent)}


/* Search bar */
.search-wrap{margin:1.5rem 0;position:relative}
.search-input{width:100%;height:50px;padding:0 50px 0 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s,background var(--transition),color var(--transition)}
.search-input:focus{border-color:var(--accent-light);box-shadow:0 0 0 3px rgba(196,122,58,0.1)}
.search-input::placeholder{color:var(--muted);opacity:0.6}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem;pointer-events:none}

/* Category filters */
.categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2rem}
.cat-btn{height:36px;padding:0 16px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
@media(max-width:560px){
  body{overflow-x:hidden}
  #app{padding:0 0.75rem 5rem}
  .categories{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1.25rem}
  .cat-btn{height:34px;padding:0 8px;font-size:0.72rem;gap:4px;justify-content:center;border-radius:16px}
  .cat-icon{font-size:0.8rem}
  .cat-btn:first-child{grid-column:1/-1}
}
.cat-btn:hover{border-color:var(--accent-light);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.cat-icon{font-size:0.9rem}

/* Stats bar */
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.stats-count{font-size:0.82rem;color:var(--muted);font-style:italic}
.stats-count span{color:var(--accent);font-weight:500}

/* Book grid */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
@media(max-width:560px){.book-grid{grid-template-columns:1fr}}

/* Book card */
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s,background var(--transition);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.book-card:hover{border-color:var(--accent-light);box-shadow:0 4px 20px rgba(139,69,19,0.12);transform:translateY(-2px)}
.book-card:hover::before{opacity:1}
.book-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.book-cat-badge{font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-pale);padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;border:1px solid rgba(139,69,19,0.12)}
.book-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--ink);line-height:1.3;transition:color var(--transition)}
.book-author{font-size:0.8rem;color:var(--muted);font-style:italic}
.book-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.audio-badge{font-size:0.7rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.audio-dot{width:6px;height:6px;border-radius:50%;background:#2d6a4f;flex-shrink:0}
.read-btn{height:28px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:background 0.2s}
.read-btn:hover{background:var(--accent-light)}

/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);font-style:italic}

/* Loading */
.loading{text-align:center;padding:4rem;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);transition:background var(--transition)}
.modal-header{padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid var(--border);background:var(--warm);position:sticky;top:0;z-index:1;transition:background var(--transition)}
.modal-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:600;color:var(--ink);margin-bottom:0.25rem}
.modal-author{font-size:0.9rem;color:var(--muted);font-style:italic;margin-bottom:0.75rem}
.modal-chips{display:flex;gap:8px;flex-wrap:wrap}
.modal-chip{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-pale);padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid rgba(139,69,19,0.12)}
.modal-player{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--card)}
.modal-play-btn{width:40px;height:40px;flex-shrink:0;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;box-shadow:0 2px 8px rgba(139,69,19,0.3)}
.modal-play-btn:hover{background:var(--accent-light)}
.modal-play-btn svg{width:16px;height:16px;fill:white}
.modal-player-info{flex:1}
.modal-player-title{font-size:0.82rem;font-weight:500;color:var(--ink)}
.modal-player-sub{font-size:0.72rem;color:var(--muted);margin-top:2px}
.modal-progress-wrap{display:flex;align-items:center;gap:8px;flex:1}
.modal-progress-bar{flex:1;height:4px;background:var(--warm);border-radius:2px;overflow:hidden}
.modal-progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.4s linear;border-radius:2px}
.modal-progress-time{font-size:0.7rem;color:var(--muted);white-space:nowrap}
.modal-speed-btns{display:flex;gap:4px}
.modal-spd{height:26px;padding:0 8px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.7rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.modal-spd.active{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-spd:hover:not(.active){border-color:var(--accent-light);color:var(--accent)}
.modal-body{padding:1.5rem 2rem;font-family:'DM Sans',sans-serif;font-size:0.97rem;line-height:1.9;color:var(--ink)}
.modal-body h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--accent);margin:1.75rem 0 0.6rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.modal-body h2:first-child{margin-top:0}
.modal-body p{margin-bottom:1rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);background:var(--warm);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0}
.modal-close{height:36px;padding:0 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.modal-close:hover{border-color:var(--accent-light);color:var(--accent)}
.modal-loading{padding:3rem;text-align:center;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <button class="dark-toggle" onclick="toggleDark()">
      <span id="dark-icon">🌙</span>
      <span id="dark-label">Dark</span>
    </button>
    <div class="logo">K<span class="logo-e">E</span>RNL</div>
    <div class="tagline">for the curious</div>
    <div class="library-subtitle">Explore our free sample library of book summaries</div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search by title or author..." oninput="filterBooks()" autocomplete="off"/>
    <span class="search-icon">🔍</span>
  </div>

  <div class="categories" id="categories"></div>

  <div class="stats-bar">
    <div class="stats-count" id="stats-count">Loading library...</div>
  </div>

  <div id="book-grid-wrap">
    <div class="loading">
      <div class="spinner"></div>
      Loading library...
    </div>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-author" id="modal-author"></div>
      <div class="modal-chips" id="modal-chips"></div>
    </div>
    <div class="modal-player">
      <button class="modal-play-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div class="modal-player-info">
        <div class="modal-player-title" id="player-title">Ready to play</div>
        <div class="modal-player-sub" id="player-sub">Press play to listen</div>
      </div>
      <div class="modal-progress-wrap">
        <div class="modal-progress-bar">
          <div class="modal-progress-fill" id="progress-fill"></div>
        </div>
        <div class="modal-progress-time" id="progress-time">0:00</div>
      </div>
      <div class="modal-speed-btns">
        <button class="modal-spd active" data-rate="1" onclick="setSpeed(1)">1×</button>
        <button class="modal-spd" data-rate="1.5" onclick="setSpeed(1.5)">1.5×</button>
        <button class="modal-spd" data-rate="2" onclick="setSpeed(2)">2×</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"><div class="modal-loading">Loading summary...</div></div>
    <div class="modal-footer">
      <button class="modal-close" onclick="closeModalDirect()">✕ Close</button>
    </div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://peebgzfufyklxzdfnesc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZWJnemZ1ZnlrbHh6ZGZuZXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwNDEsImV4cCI6MjA5MDY5ODA0MX0.TXg5ztQsoGvE5j49GRRtaNdTIVM2jS1-LmMNzu7YA5g';

// ─── Categories ──────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: 'all', label: 'All Books', icon: '📚' },
  { id: 'mind', label: 'Mind & Psychology', icon: '🧠' },
  { id: 'money', label: 'Money & Business', icon: '💰' },
  { id: 'self', label: 'Self Improvement', icon: '🌱' },
  { id: 'classic', label: 'Classic Fiction', icon: '📖' },
  { id: 'family', label: 'Family & Children', icon: '🧒' },
  { id: 'history', label: 'History & Politics', icon: '🌍' },
  { id: 'science', label: 'Science & Nature', icon: '🔬' },
  { id: 'leadership', label: 'Leadership', icon: '💪' },
  { id: 'health', label: 'Health & Wellbeing', icon: '❤️' },

  { id: 'philosophy', label: 'Philosophy', icon: '🎯' },
];

// ─── Book → Category mapping (also serves as the free tier allowlist) ─────────
const BOOK_CATEGORIES = {

  'fahrenheit 451': 'classic',

  "harry potter and the philosopher's stone": 'family',
  'the lion the witch and the wardrobe': 'family',
  'charlie and the chocolate factory': 'family',
  'matilda': 'family',

  'james and the giant peach': 'family',
  'the hunger games': 'fiction',
  'the da vinci code': 'fiction',
  'gone girl': 'fiction',
  'the girl with the dragon tattoo': 'fiction',

  'life of pi': 'fiction',

  'a thousand splendid suns': 'fiction',

  'the old man and the sea': 'classic',
  'crime and punishment': 'classic',

  'the prince': 'philosophy',
  'influence': 'mind',
  'the psychology of money': 'money',
  'the millionaire next door': 'money',
  'i will teach you to be rich': 'money',
  'the total money makeover': 'money',
  'why we sleep': 'health',

  'ikigai': 'health',

  'breath': 'health',

  'stolen focus': 'health',
  'digital minimalism': 'self',
  'the social animal': 'mind',
  'quiet': 'mind',
  'emotional intelligence': 'mind',
  'the gifts of imperfection': 'self',
  'feel the fear and do it anyway': 'self',
  'the miracle morning': 'self',
  "can't hurt me": 'self',
  'extreme ownership': 'leadership',
  'the 48 laws of power': 'leadership',
  'mastery': 'self',
  'the art of thinking clearly': 'mind',
  'black box thinking': 'mind',

  'shoe dog': 'biography',
  'born to run': 'health',
  'the power of the dog': 'fiction',
};

// ─── State ───────────────────────────────────────────────────────────────────
let allBooks = [];
let activeCategory = 'all';
let currentBook = null;
let audioEl = null;
let isPlaying = false;
let playbackRate = 1;

// ─── Dark mode ───────────────────────────────────────────────────────────────
function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('kernl_dark', isDark ? '1' : '0');
  document.getElementById('dark-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('dark-label').textContent = isDark ? 'Light' : 'Dark';
}

function initDark() {
  const saved = localStorage.getItem('kernl_dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved !== null ? saved === '1' : prefersDark;
  if (isDark) {
    document.documentElement.classList.add('dark');
    document.getElementById('dark-icon').textContent = '☀️';
    document.getElementById('dark-label').textContent = 'Light';
  }
}

// ─── Category helpers ────────────────────────────────────────────────────────
function getCategory(title) {
  const key = (title || '').toLowerCase().trim();
  return BOOK_CATEGORIES[key] || 'fiction';
}

function getCategoryInfo(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[0];
}

// ─── Fetch library from Supabase ─────────────────────────────────────────────
async function loadLibrary() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/summaries?select=title,author,lookup_key,words&lookup_key=like.*nospoilers*&order=title.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();

    // Filter to the 100 free tier books only, dedup by title (catches author name variants)
    const seen = new Set();
    allBooks = data.filter(b => {
      const titleKey = (b.title || '').toLowerCase().trim();
      if (!(titleKey in BOOK_CATEGORIES)) return false; // free tier filter
      if (seen.has(titleKey)) return false; // dedup on title only
      seen.add(titleKey);
      return true;
    }).map(b => ({
      ...b,
      category: getCategory(b.title)
    }));

    renderCategories();
    renderGrid();
  } catch (err) {
    document.getElementById('book-grid-wrap').innerHTML =
      '<div class="empty-state">Could not load library. Please try again.</div>';
  }
}

// ─── Render categories ───────────────────────────────────────────────────────
function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = CATEGORIES.map(cat => {
    const count = cat.id === 'all'
      ? allBooks.length
      : allBooks.filter(b => b.category === cat.id).length;
    if (count === 0 && cat.id !== 'all') return '';
    return `<button class="cat-btn ${activeCategory === cat.id ? 'active' : ''}"
      onclick="setCategory('${cat.id}')">
      <span class="cat-icon">${cat.icon}</span>
      ${cat.label}
      <span style="opacity:0.6;font-size:0.75em">(${count})</span>
    </button>`;
  }).join('');
}

function setCategory(id) {
  activeCategory = id;
  document.getElementById('search-input').value = '';
  renderCategories();
  renderGrid();
}

// ─── Render grid ─────────────────────────────────────────────────────────────
function filterBooks() {
  activeCategory = 'all';
  renderCategories();
  renderGrid();
}

function renderGrid() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const filtered = allBooks.filter(b => {
    const matchCat = activeCategory === 'all' || b.category === activeCategory;
    const matchSearch = !query ||
      b.title.toLowerCase().includes(query) ||
      b.author.toLowerCase().includes(query);
    return matchCat && matchSearch;
  });

  const countEl = document.getElementById('stats-count');
  const catInfo = getCategoryInfo(activeCategory);
  if (query) {
    countEl.innerHTML = `<span>${filtered.length}</span> book${filtered.length !== 1 ? 's' : ''} matching "${query}"`;
  } else if (activeCategory === 'all') {
    countEl.innerHTML = `<span>${filtered.length}</span> books in the library`;
  } else {
    countEl.innerHTML = `${catInfo.icon} <span>${filtered.length}</span> books in ${catInfo.label}`;
  }

  if (!filtered.length) {
    document.getElementById('book-grid-wrap').innerHTML =
      '<div class="empty-state">No books found.</div>';
    return;
  }

  document.getElementById('book-grid-wrap').innerHTML =
    '<div class="book-grid">' +
    filtered.map(b => {
      const cat = getCategoryInfo(b.category);
      return `<div class="book-card" onclick="openBook('${esc(b.title)}','${esc(b.author)}')">
        <div class="book-card-top">
          <div>
            <div class="book-title">${esc(b.title)}</div>
            <div class="book-author">by ${esc(b.author)}</div>
          </div>
          <div class="book-cat-badge">${cat.icon} ${cat.label}</div>
        </div>
        <div class="book-card-footer">
          <div class="audio-badge"><div class="audio-dot"></div> Audio available</div>
          <button class="read-btn" onclick="event.stopPropagation();openBook('${esc(b.title)}','${esc(b.author)}')">Read ›</button>
        </div>
      </div>`;
    }).join('') +
    '</div>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openBook(title, author) {
  window.location.href = '/summary.html?title=' + encodeURIComponent(title) + '&author=' + encodeURIComponent(author);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  stopAudio();
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
  currentBook = null;
}

// ─── Audio ───────────────────────────────────────────────────────────────────
function setSpeed(rate) {
  playbackRate = rate;
  document.querySelectorAll('.modal-spd').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.rate) === rate);
  });
  if (audioEl) audioEl.playbackRate = rate;
}

function setPlayerState(playing, sub) {
  isPlaying = playing;
  document.getElementById('play-icon').innerHTML = playing
    ? '<rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/>'
    : '<polygon points="6,3 20,12 6,21"/>';
  if (sub) document.getElementById('player-sub').textContent = sub;
}

function stopAudio() {
  if (audioEl) { audioEl.pause(); audioEl.src = ''; audioEl = null; }
  isPlaying = false;
  setPlayerState(false, null);
}

async function startAudio() {
  if (!currentBook || !currentBook.plain) return;
  setPlayerState(true, 'Loading audio…');

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: currentBook.plain,
        voice: 'female',
        title: currentBook.title,
        author: currentBook.author
      })
    });

    if (!res.ok) throw new Error('TTS failed');

    const ct = res.headers.get('content-type') || '';
    let audioUrl, blobUrl = null;

    if (ct.includes('application/json')) {
      const data = await res.json();
      audioUrl = data.url;
    } else {
      const blob = await res.blob();
      blobUrl = URL.createObjectURL(blob);
      audioUrl = blobUrl;
    }

    audioEl = new Audio(audioUrl);
    audioEl.playbackRate = playbackRate;

    audioEl.addEventListener('timeupdate', () => {
      if (!audioEl || !audioEl.duration) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      const m = Math.floor(audioEl.currentTime / 60);
      const s = Math.floor(audioEl.currentTime % 60);
      document.getElementById('progress-time').textContent = m + ':' + String(s).padStart(2, '0');
    });

    audioEl.addEventListener('ended', () => {
      document.getElementById('progress-fill').style.width = '100%';
      setPlayerState(false, 'Finished — press play to replay');
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      audioEl = null;
    });

    audioEl.addEventListener('error', () => {
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      audioEl = null;
      setPlayerState(false, 'Audio unavailable');
    });

    audioEl.play();
    setPlayerState(true, 'Now playing — Nova voice');

  } catch (err) {
    setPlayerState(false, 'Audio unavailable');
  }
}

function togglePlay() {
  if (!currentBook) return;
  if (isPlaying) {
    if (audioEl) audioEl.pause();
    setPlayerState(false, 'Paused — press play to continue');
    return;
  }
  if (audioEl && audioEl.paused && audioEl.src) {
    audioEl.play();
    setPlayerState(true, 'Now playing — Nova voice');
    return;
  }
  startAudio();
}

// ─── Init ────────────────────────────────────────────────────────────────────
initDark();
loadLibrary();
</script>
