<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL Library &mdash; for the curious</title>
<meta name="description" content="Explore our free sample library of book summaries.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
#app{max-width:1100px;margin:0 auto;padding:0 1.5rem 5rem}
.masthead{text-align:center;padding:3rem 0 2rem;position:relative;margin-bottom:2rem}
.masthead::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.2rem);font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1}
.logo-e{color:var(--accent)}
.tagline{font-size:0.85rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.5rem;font-weight:500}
.library-subtitle{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:var(--muted);margin-top:0.75rem}
.dark-toggle{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:6px;opacity:0.7}
.dark-toggle:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.search-wrap{margin:1.5rem 0;position:relative}
.search-input{width:100%;height:50px;padding:0 50px 0 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s,background var(--transition),color var(--transition)}
.search-input:focus{border-color:var(--accent-light);box-shadow:0 0 0 3px rgba(196,122,58,0.1)}
.search-input::placeholder{color:var(--muted);opacity:0.6}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem;pointer-events:none}
.categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2rem}
.cat-btn{height:36px;padding:0 16px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.cat-btn:hover{border-color:var(--accent-light);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.cat-icon{font-size:0.9rem}
@media(max-width:560px){
  body{overflow-x:hidden}
  #app{padding:0 0.75rem 5rem}
  .categories{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1.25rem}
  .cat-btn{height:34px;padding:0 8px;font-size:0.72rem;gap:4px;justify-content:center;border-radius:16px}
  .cat-icon{font-size:0.8rem}
  .cat-btn:first-child{grid-column:1/-1}
}
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.stats-count{font-size:0.82rem;color:var(--muted);font-style:italic}
.stats-count span{color:var(--accent);font-weight:500}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
@media(max-width:560px){.book-grid{grid-template-columns:1fr}}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s,background var(--transition);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.book-card:hover{border-color:var(--accent-light);box-shadow:0 4px 20px rgba(139,69,19,0.12);transform:translateY(-2px)}
.book-card:hover::before{opacity:1}
.book-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer}
.book-cat-badge{font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-pale);padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;border:1px solid rgba(139,69,19,0.12)}
.book-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--ink);line-height:1.3;transition:color var(--transition)}
.book-author{font-size:0.8rem;color:var(--muted);font-style:italic}
.book-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.voice-btns{display:flex;gap:6px}
.voice-pick-btn{height:30px;padding:0 12px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px}
.voice-pick-btn:hover{border-color:var(--accent-light);color:var(--accent)}
.voice-pick-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.read-btn{height:30px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.read-btn:hover{background:var(--accent-light)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);font-style:italic}
.loading{text-align:center;padding:4rem;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <button class="dark-toggle" onclick="toggleDark()">
      <span id="dark-icon">&#x1F319;</span>
      <span id="dark-label">Dark</span>
    </button>
    <div class="logo">K<span class="logo-e">E</span>RNL</div>
    <div class="tagline">for the curious</div>
    <div class="library-subtitle">Explore our free sample library of book summaries</div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search by title or author..." oninput="filterBooks()" autocomplete="off"/>
    <span class="search-icon">&#x1F50D;</span>
  </div>
  <div class="categories" id="categories"></div>
  <div class="stats-bar">
    <div class="stats-count" id="stats-count">Loading library...</div>
  </div>
  <div id="book-grid-wrap">
    <div class="loading"><div class="spinner"></div>Loading library...</div>
  </div>
</div>
<script>
function e(cp){return String.fromCodePoint(cp);}

var CATEGORIES = [
  { id: 'all',        label: 'All Books',           icon: e(0x1F4DA) },
  { id: 'mind',       label: 'Mind & Psychology',   icon: e(0x1F9E0) },
  { id: 'money',      label: 'Money & Business',    icon: e(0x1F4B0) },
  { id: 'self',       label: 'Self Improvement',    icon: e(0x1F331) },
  { id: 'classic',    label: 'Classic Fiction',     icon: e(0x1F4D6) },
  { id: 'family',     label: 'Family & Children',   icon: e(0x1F9D2) },
  { id: 'history',    label: 'History & Politics',  icon: e(0x1F30D) },
  { id: 'science',    label: 'Science & Nature',    icon: e(0x1F52C) },
  { id: 'leadership', label: 'Leadership',          icon: e(0x1F4AA) },
  { id: 'health',     label: 'Health & Wellbeing',  icon: e(0x2764)+e(0xFE0F) },
  { id: 'fiction',    label: 'Modern Fiction',      icon: e(0x1F4DA) },
  { id: 'biography',  label: 'Biography',           icon: e(0x1F9ED) },
  { id: 'philosophy', label: 'Philosophy',          icon: e(0x1F3AF) },
];

// Exactly 24 curated books â 2 per category
var CURATED_BOOKS = [
  { title: 'Thinking Fast and Slow',              author: 'Daniel Kahneman',   category: 'mind'       },
  { title: 'Quiet',                               author: 'Susan Cain',        category: 'mind'       },
  { title: 'The Psychology of Money',             author: 'Morgan Housel',     category: 'money'      },
  { title: 'Rich Dad Poor Dad',                   author: 'Robert Kiyosaki',   category: 'money'      },
  { title: 'Atomic Habits',                       author: 'James Clear',       category: 'self'       },
  { title: 'Deep Work',                           author: 'Cal Newport',       category: 'self'       },
  { title: '1984',                                author: 'George Orwell',     category: 'classic'    },
  { title: 'To Kill a Mockingbird',               author: 'Harper Lee',        category: 'classic'    },
  { title: 'The Lion the Witch and the Wardrobe', author: 'C.S. Lewis',        category: 'family'     },
  { title: 'Matilda',                             author: 'Roald Dahl',        category: 'family'     },
  { title: 'Sapiens',                             author: 'Yuval Noah Harari', category: 'history'    },
  { title: 'Guns Germs and Steel',                author: 'Jared Diamond',     category: 'history'    },
  { title: 'A Brief History of Time',             author: 'Stephen Hawking',   category: 'science'    },
  { title: 'Why We Sleep',                        author: 'Matthew Walker',    category: 'science'    },
  { title: 'Start With Why',                      author: 'Simon Sinek',       category: 'leadership' },
  { title: 'Good to Great',                       author: 'Jim Collins',       category: 'leadership' },
  { title: 'Ikigai',                              author: 'Hector Garcia',     category: 'health'     },
  { title: 'Breath',                              author: 'James Nestor',      category: 'health'     },
  { title: 'The Alchemist',                       author: 'Paulo Coelho',      category: 'fiction'    },
  { title: 'The Kite Runner',                     author: 'Khaled Hosseini',   category: 'fiction'    },
  { title: 'Shoe Dog',                            author: 'Phil Knight',       category: 'biography'  },
  { title: 'Long Walk to Freedom',                author: 'Nelson Mandela',    category: 'biography'  },
  { title: "Man's Search for Meaning",            author: 'Viktor Frankl',     category: 'philosophy' },
  { title: 'Meditations',                         author: 'Marcus Aurelius',   category: 'philosophy' },
];

// Track selected voice per book (default female)
var voiceSelections = {};
CURATED_BOOKS.forEach(function(b) {
  voiceSelections[b.title] = 'female';
});

var voiceSelections = {};
var activeCategory = 'all';

function toggleDark() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('kernl_dark', isDark ? '1' : '0');
  document.getElementById('dark-icon').innerHTML = isDark ? '&#x2600;&#xFE0F;' : '&#x1F319;';
  document.getElementById('dark-label').textContent = isDark ? 'Light' : 'Dark';
}
function initDark() {
  var saved = localStorage.getItem('kernl_dark');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var isDark = saved !== null ? saved === '1' : prefersDark;
  if (isDark) {
    document.documentElement.classList.add('dark');
    document.getElementById('dark-icon').innerHTML = '&#x2600;&#xFE0F;';
    document.getElementById('dark-label').textContent = 'Light';
  }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getCategoryInfo(id) {
  return CATEGORIES.find(function(c){ return c.id === id; }) || CATEGORIES[0];
}

function openBook(title, author) {
  var voice = voiceSelections[title] || 'female';
  window.location.href = '/summary.html?title=' + encodeURIComponent(title) + '&author=' + encodeURIComponent(author) + '&voice=' + voice;
}

function setVoice(title, voice) {
  voiceSelections[title] = voice;
  // Update button states for this card
  var cards = document.querySelectorAll('.book-card');
  cards.forEach(function(card) {
    if (card.dataset.title === title) {
      card.querySelectorAll('.voice-pick-btn').forEach(function(btn) {
        btn.classList.toggle('selected', btn.dataset.voice === voice);
      });
    }
  });
}

function renderCategories() {
  var container = document.getElementById('categories');
  container.innerHTML = CATEGORIES.map(function(cat) {
    var count = cat.id === 'all'
      ? CURATED_BOOKS.length
      : CURATED_BOOKS.filter(function(b){ return b.category === cat.id; }).length;
    if (count === 0 && cat.id !== 'all') return '';
    return '<button class="cat-btn ' + (activeCategory === cat.id ? 'active' : '') + '" onclick="setCategory(\'' + cat.id + '\')">'
      + '<span class="cat-icon">' + cat.icon + '</span> '
      + cat.label
      + ' <span style="opacity:0.6;font-size:0.75em">(' + count + ')</span>'
      + '</button>';
  }).join('');
}

function setCategory(id) {
  activeCategory = id;
  document.getElementById('search-input').value = '';
  renderCategories();
  renderGrid();
}

function filterBooks() {
  activeCategory = 'all';
  renderCategories();
  renderGrid();
}

function renderGrid() {
  var query = document.getElementById('search-input').value.toLowerCase().trim();
  var filtered = CURATED_BOOKS.filter(function(b) {
    var matchCat = activeCategory === 'all' || b.category === activeCategory;
    var matchSearch = !query || b.title.toLowerCase().indexOf(query) >= 0 || b.author.toLowerCase().indexOf(query) >= 0;
    return matchCat && matchSearch;
  });

  var countEl = document.getElementById('stats-count');
  var catInfo = getCategoryInfo(activeCategory);
  if (query) {
    countEl.innerHTML = '<span>' + filtered.length + '</span> book' + (filtered.length !== 1 ? 's' : '') + ' matching "' + query + '"';
  } else if (activeCategory === 'all') {
    countEl.innerHTML = '<span>' + filtered.length + '</span> books in the free library';
  } else {
    countEl.innerHTML = catInfo.icon + ' <span>' + filtered.length + '</span> books in ' + catInfo.label;
  }

  if (!filtered.length) {
    document.getElementById('book-grid-wrap').innerHTML = '<div class="empty-state">No books found.</div>';
    return;
  }

  var wrap = document.createElement('div');
  wrap.className = 'book-grid';

  filtered.forEach(function(b) {
    var cat = getCategoryInfo(b.category);
    var selectedVoice = voiceSelections[b.title] || 'female';
    var card = document.createElement('div');
    card.className = 'book-card';
    card.dataset.title = b.title;
    card.dataset.author = b.author;

    card.innerHTML =
      '<div class="book-card-top">' +
        '<div>' +
          '<div class="book-title">' + esc(b.title) + '</div>' +
          '<div class="book-author">by ' + esc(b.author) + '</div>' +
        '</div>' +
        '<div class="book-cat-badge">' + cat.icon + ' ' + cat.label + '</div>' +
      '</div>' +
      '<div class="book-card-footer">' +
        '<div class="voice-btns">' +
          '<button class="voice-pick-btn ' + (selectedVoice === 'female' ? 'selected' : '') + '" data-voice="female" data-title="' + esc(b.title) + '">' +
            '&#9792; Female' +
          '</button>' +
          '<button class="voice-pick-btn ' + (selectedVoice === 'male' ? 'selected' : '') + '" data-voice="male" data-title="' + esc(b.title) + '">' +
            '&#9794; Male' +
          '</button>' +
        '</div>' +
        '<button class="read-btn">Read &#x203A;</button>' +
      '</div>';

    // Click card body to open
    card.querySelector('.book-card-top').addEventListener('click', function() {
      openBook(b.title, b.author);
    });

    // Voice buttons
    card.querySelectorAll('.voice-pick-btn').forEach(function(btn) {
      btn.addEventListener('click', function(ev) {
        ev.stopPropagation();
        setVoice(btn.dataset.title, btn.dataset.voice);
      });
    });

    // Read button
    card.querySelector('.read-btn').addEventListener('click', function(ev) {
      ev.stopPropagation();
      openBook(b.title, b.author);
    });

    wrap.appendChild(card);
  });

  var gridWrap = document.getElementById('book-grid-wrap');
  gridWrap.innerHTML = '';
  gridWrap.appendChild(wrap);
}

initDark();
renderCategories();
renderGrid();
</script>
</body>
</html>
