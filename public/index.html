<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL — Read Less. Know More.</title>
<meta name="description" content="Read Less. Know More. AI-powered book summaries you can read or listen to in 10 minutes.">
<meta property="og:title" content="KERNL — Read Less. Know More.">
<meta property="og:description" content="AI-powered book summaries you can read or listen to in 10 minutes.">
<meta property="og:url" content="https://kernl-three.vercel.app/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="KERNL — Read Less. Know More.">
<meta name="twitter:description" content="AI-powered book summaries you can read or listen to in 10 minutes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--success-bg:#e8f5ee;--success-fg:#2d6a4f;--error-bg:#fdf0f0;--error-fg:#8B1A1A;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a;--success-bg:#1a2e22;--success-fg:#5aab7a;--error-bg:#2e1a1a;--error-fg:#d4706f}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
#app{max-width:900px;margin:0 auto;padding:0 1.5rem 5rem}
.masthead{text-align:center;padding:3rem 0 2.5rem;position:relative;margin-bottom:2.5rem}
.masthead::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,4rem);font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1;transition:color var(--transition)}
.logo-e{color:var(--accent)}
.tagline{font-size:0.95rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.6rem;font-weight:500;transition:color var(--transition)}
.ornament{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);opacity:0.35;margin:0.5rem 0 0;letter-spacing:0.3em}
.dark-toggle{position:absolute;top:0;right:0;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:6px;opacity:0.7}
.dark-toggle:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.dark-toggle-icon{font-size:0.85rem}
.search-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:2rem;box-shadow:0 2px 16px rgba(139,69,19,0.06);transition:background var(--transition),border-color var(--transition)}
.search-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:560px){.search-grid{grid-template-columns:1fr}}
.field{position:relative}
.field label{display:block;font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:500;transition:color var(--transition)}
.field input{width:100%;height:46px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);transition:border-color 0.2s,box-shadow 0.2s,background var(--transition),color var(--transition);outline:none}
.field input:focus{border-color:var(--accent-light);box-shadow:0 0 0 3px rgba(196,122,58,0.1)}
.field input::placeholder{color:var(--muted);opacity:0.6}
.author-autofilled{border-color:var(--accent) !important;box-shadow:0 0 0 3px rgba(139,69,19,0.15) !important;transition:border-color 0.3s,box-shadow 0.3s !important}
.book-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(139,69,19,0.15);z-index:100;display:none;overflow:hidden;transition:background var(--transition),border-color var(--transition)}
.dropdown-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:var(--accent-pale)}
.dropdown-title{font-size:0.9rem;font-weight:500;color:var(--ink);transition:color var(--transition)}
.dropdown-author{font-size:0.78rem;color:var(--muted);margin-top:2px;transition:color var(--transition)}
.search-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.voice-row{display:flex;align-items:center;gap:8px}
.voice-label{font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:500}
.voice-btn{height:34px;padding:0 18px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.voice-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.voice-btn:hover:not(.active){border-color:var(--accent-light);color:var(--accent)}
.btn-generate{height:46px;padding:0 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s,transform 0.1s,box-shadow 0.2s;white-space:nowrap;box-shadow:0 2px 8px rgba(139,69,19,0.25)}
.btn-generate:hover:not(:disabled){background:var(--accent-light)}
.btn-generate:disabled{opacity:0.45;cursor:not-allowed;box-shadow:none}
.status-bar{display:none;align-items:center;gap:10px;padding:0.8rem 1rem;background:var(--warm);border-radius:var(--radius-sm);margin-top:1rem;font-size:0.87rem;color:var(--muted);transition:background var(--transition)}
.status-bar.show{display:flex}
.spinner{width:16px;height:16px;flex-shrink:0;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-bar{display:none;padding:0.8rem 1rem;background:var(--error-bg);border:1px solid rgba(139,26,26,0.18);border-radius:var(--radius-sm);margin-top:1rem;font-size:0.87rem;color:var(--error-fg);line-height:1.5;transition:background var(--transition)}
.error-bar.show{display:block}
.summary-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(139,69,19,0.1);margin-bottom:2rem;transition:background var(--transition),border-color var(--transition)}
.summary-card.show{display:block}
.summary-header{padding:2rem 2rem 1.75rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--warm) 0%,var(--warm) 100%);position:relative;transition:background var(--transition)}
.summary-header-ornament{position:absolute;top:1rem;right:1.5rem;font-family:'Playfair Display',serif;font-size:5rem;color:var(--accent);opacity:0.06;line-height:1;pointer-events:none}
.summary-book-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:600;line-height:1.2;color:var(--ink);margin-bottom:0.3rem;transition:color var(--transition)}
.summary-book-author{font-size:0.9rem;color:var(--muted);font-style:italic;margin-bottom:1rem;transition:color var(--transition)}
.summary-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-pale);padding:4px 12px;border-radius:20px;font-weight:500;border:1px solid rgba(139,69,19,0.12);transition:all var(--transition)}
.player{padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:background var(--transition),border-color var(--transition)}
.play-btn{width:44px;height:44px;flex-shrink:0;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.1s;box-shadow:0 2px 8px rgba(139,69,19,0.3)}
.play-btn:hover{background:var(--accent-light)}
.play-btn:active{transform:scale(0.95)}
.play-btn svg{width:18px;height:18px;fill:white}
.player-center{flex:1;min-width:120px}
.player-title{font-size:0.85rem;font-weight:500;color:var(--ink);transition:color var(--transition)}
.player-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;transition:color var(--transition)}
.progress-wrap{flex:2;min-width:100px;display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:4px;background:var(--warm);border-radius:2px;overflow:hidden;cursor:pointer;transition:background var(--transition)}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.4s linear;border-radius:2px}
.progress-time{font-size:0.72rem;color:var(--muted);white-space:nowrap;transition:color var(--transition)}
.player-voice-btns{display:flex;gap:6px}
.pvb{height:30px;padding:0 12px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.pvb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pvb:hover:not(.on){border-color:var(--accent-light);color:var(--accent)}
.summary-actions{padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--warm);display:flex;gap:10px;flex-wrap:wrap;align-items:center;transition:background var(--transition),border-color var(--transition)}
.summary-body{padding:2rem 2.5rem;font-family:'DM Sans',sans-serif;font-size:1rem;line-height:1.9;color:var(--ink);transition:color var(--transition)}
@media(max-width:560px){.summary-body{padding:1.5rem}}
.summary-body h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--accent);margin:2rem 0 0.75rem;padding-bottom:8px;border-bottom:1px solid var(--border);transition:color var(--transition),border-color var(--transition)}
.summary-body h2:first-child{margin-top:0}
.summary-body p{margin-bottom:1.1rem}
.summary-body p:last-child{margin-bottom:0}
.megan-words-section{border-top:1px solid var(--border);transition:border-color var(--transition)}
.megan-words-header{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--warm);transition:background var(--transition)}
.megan-words-header:hover{background:var(--accent-pale)}
.megan-words-title{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--accent)}
.megan-words-title-icon{font-size:1.1rem}
.megan-words-subtitle{font-size:0.75rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;font-style:italic;margin-left:4px}
.megan-arrow{font-size:0.75rem;color:var(--muted);transition:transform 0.3s ease}
.megan-words-grid{display:none;padding:1.5rem 2rem 2rem;grid-template-columns:repeat(3,1fr);gap:12px;background:var(--card);transition:background var(--transition)}
.megan-words-grid.open{display:grid}
.megan-word-item{background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.9rem 1.1rem;transition:all var(--transition)}
.megan-word-item:hover{border-color:var(--accent-light);transform:translateY(-1px)}
.megan-word{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:4px}
.megan-definition{font-size:0.82rem;color:var(--muted);line-height:1.5}
.summary-footer{padding:1rem 2rem;border-top:1px solid var(--border);background:var(--warm);display:flex;justify-content:flex-end;transition:background var(--transition),border-color var(--transition)}
.btn-action{height:38px;padding:0 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-action:hover{border-color:var(--accent-light);color:var(--accent);background:var(--warm)}
.btn-action.danger:hover{color:var(--error-fg);border-color:rgba(139,26,26,0.3)}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;margin-top:2rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:var(--muted);transition:color var(--transition)}
.section-right{display:flex;gap:10px;align-items:center}
.section-badge{font-size:0.75rem;color:var(--muted);background:var(--warm);padding:3px 12px;border-radius:20px;border:1px solid var(--border);transition:all var(--transition)}
.archive-clear-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;opacity:0.6}
.archive-clear-btn:hover{opacity:1;color:var(--error-fg)}
.archive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:2.5rem}
.archive-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s,background var(--transition);position:relative;overflow:hidden}
.archive-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.2s}
.archive-item:hover{border-color:var(--accent-light);box-shadow:0 4px 16px rgba(139,69,19,0.1);transform:translateY(-1px)}
.archive-item:hover::before{opacity:1}
.archive-book-title{font-family:'Playfair Display',serif;font-size:0.97rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:3px;transition:color var(--transition)}
.archive-book-author{font-size:0.8rem;color:var(--muted);margin-bottom:8px;transition:color var(--transition)}
.archive-footer{display:flex;align-items:center;justify-content:space-between}
.archive-date{font-size:0.72rem;color:var(--muted);opacity:0.7}
.archive-chip{font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--success-fg);background:var(--success-bg);padding:2px 8px;border-radius:10px;font-weight:500;transition:all var(--transition)}
.archive-empty{text-align:center;padding:2rem;color:var(--muted);font-size:0.9rem;font-style:italic;border:1px dashed var(--border);border-radius:var(--radius-sm);margin-bottom:2.5rem;background:var(--warm);opacity:0.7;transition:all var(--transition)}
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">
      <span class="dark-toggle-icon" id="dark-icon">🌙</span>
      <span id="dark-label">Dark</span>
    </button>
    <div class="logo">K<span class="logo-e">E</span>RNL</div>
    <div class="tagline">Read less. Know more.</div>
    <div class="ornament">❧</div>
  </div>
  <div class="search-card">
    <div class="search-grid">
      <div class="field">
        <label>Book title</label>
        <input type="text" id="book-input" placeholder="e.g. Papillon" autocomplete="off" />
      </div>
      <div class="field">
        <label>Author</label>
        <input type="text" id="author-input" placeholder="e.g. Henri Charrière" autocomplete="off" />
      </div>
    </div>
    <div class="search-bottom">
      <div class="voice-row">
        <span class="voice-label">Voice</span>
        <button class="voice-btn active" id="vbf" onclick="setVoice('female')">&#9792; Female</button>
        <button class="voice-btn" id="vbm" onclick="setVoice('male')">&#9794; Male</button>
      </div>
      <button class="btn-generate" id="gen-btn" onclick="handleGenerate()">Summarise ›</button>
    </div>
    <div class="status-bar" id="status-bar">
      <div class="spinner"></div>
      <span id="status-text">Generating summary — please wait about 30 seconds...</span>
    </div>
    <div class="error-bar" id="error-bar"></div>
  </div>
  <div class="summary-card" id="summary-card">
    <div class="summary-header">
      <div class="summary-header-ornament">"</div>
      <div class="summary-book-title" id="s-title"></div>
      <div class="summary-book-author" id="s-author"></div>
      <div class="summary-chips">
        <div class="chip">KERNL Deep</div>
        <div class="chip" id="s-words"></div>
        <div class="chip" id="s-source"></div>
      </div>
    </div>
    <div class="player">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div class="player-center">
        <div class="player-title" id="player-title">Ready</div>
        <div class="player-sub" id="player-sub">Press play to listen</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-time" id="progress-time">0:00</div>
      </div>
      <div class="player-voice-btns">
        <button class="pvb on" id="pvf" onclick="setVoice('female')">&#9792;</button>
        <button class="pvb" id="pvm" onclick="setVoice('male')">&#9794;</button>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-action" onclick="downloadTxt()">&#8595; Text file</button>
      <button class="btn-action" onclick="downloadEpub()">&#128218; EPUB / Kindle</button>
      <button class="btn-action" onclick="printSummary()">&#128438; Print</button>
    </div>
    <div class="summary-body" id="summary-body"></div>
    <div class="megan-words-section" id="megan-words-section" style="display:none">
      <div class="megan-words-header" onclick="toggleMeganWords()">
        <div class="megan-words-title">
          <span class="megan-words-title-icon">📖</span>
          Mega Words
          <span class="megan-words-subtitle">— interesting words from this book</span>
        </div>
        <span class="megan-arrow" id="megan-arrow">▼</span>
      </div>
      <div class="megan-words-grid" id="megan-words-grid"></div>
    </div>
    <div class="summary-footer">
      <button class="btn-action danger" onclick="closeSummary()">&#10005; Close</button>
    </div>
  </div>
  <div class="section-header">
    <div class="section-title">Your library</div>
    <div class="section-right">
      <button class="archive-clear-btn" id="clear-btn" onclick="clearArchive()" style="display:none">Clear all</button>
      <div class="section-badge" id="archive-count">0 summaries</div>
    </div>
  </div>
  <div id="archive-container"></div>
</div>
<script src="/app.js?v=12"></script>
</body>
</html>
