<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL &mdash; for the curious</title>
<meta name="description" content="for the curious &mdash; AI-powered book summaries you can read or listen to in 10 minutes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--success-bg:#e8f5ee;--success-fg:#2d6a4f;--error-bg:#fdf0f0;--error-fg:#8B1A1A;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a;--success-bg:#1a2e22;--success-fg:#5aab7a;--error-bg:#2e1a1a;--error-fg:#d4706f}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
#app{max-width:900px;margin:0 auto;padding:0 1.5rem 5rem}
.masthead{text-align:center;padding:2rem 0 1.5rem;position:relative;margin-bottom:2rem}
.masthead::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3rem);font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1;transition:color var(--transition)}
.logo-e{color:var(--accent)}
.tagline{font-size:0.85rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.5rem;font-weight:500}
.dark-toggle{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);transition:all var(--transition);display:flex;align-items:center;gap:6px;opacity:0.7}
.dark-toggle:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.back-link{position:absolute;top:1rem;left:1rem;background:var(--accent);border:none;border-radius:20px;padding:7px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:#fff;font-weight:500;transition:all var(--transition);text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{background:var(--accent-light)}
.loading-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4rem;text-align:center;color:var(--muted);font-style:italic}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(139,69,19,0.1);margin-bottom:2rem;transition:background var(--transition),border-color var(--transition)}
.summary-header{padding:2rem 2rem 1.75rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--warm) 0%,var(--warm) 100%);position:relative;transition:background var(--transition)}
.summary-header-ornament{position:absolute;top:1rem;right:1.5rem;font-family:'Playfair Display',serif;font-size:5rem;color:var(--accent);opacity:0.06;line-height:1;pointer-events:none}
.summary-title-row{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;margin-bottom:0.3rem}
.summary-book-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:600;line-height:1.2;color:var(--ink);transition:color var(--transition)}
.summary-word-count{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-pale);padding:4px 12px;border-radius:20px;font-weight:500;border:1px solid rgba(139,69,19,0.12);white-space:nowrap;flex-shrink:0;transition:all var(--transition)}
.summary-book-author{font-size:0.9rem;color:var(--muted);font-style:italic;margin-bottom:0.5rem;transition:color var(--transition)}
.player{padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--card);transition:background var(--transition),border-color var(--transition)}
.player-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.play-btn{width:44px;height:44px;flex-shrink:0;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.1s,box-shadow 0.3s;box-shadow:0 2px 8px rgba(139,69,19,0.3)}
.play-btn:hover{background:var(--accent-light)}
.play-btn:active{transform:scale(0.95)}
.play-btn svg{width:18px;height:18px;fill:white}
.play-btn.playing{box-shadow:0 0 0 5px var(--accent-pale),0 2px 8px rgba(139,69,19,0.35)}
.player-center{flex:1;min-width:120px}
.player-title{font-size:0.85rem;font-weight:500;color:var(--ink);transition:color var(--transition)}
.player-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;transition:color var(--transition)}
.player-sub.playing{color:var(--accent);font-weight:500}
.player-voice-btns{display:flex;gap:6px;flex-shrink:0}
.pvb{height:30px;padding:0 14px;border:1px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.pvb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pvb.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pvb:hover:not(.on):not(.active){border-color:var(--accent-light);color:var(--accent)}
.player-scrub-row{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:10px;border:1px solid transparent;background:transparent;transition:background 0.3s,border-color 0.3s}
.player-scrub-row.active{background:var(--accent-pale);border-color:var(--border)}
html.dark .player-scrub-row.active{background:rgba(196,122,58,0.1);border-color:rgba(196,122,58,0.25)}
.skip-btn{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:transparent;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:'DM Sans',sans-serif;font-size:0.62rem;font-weight:700;color:var(--muted);line-height:1}
.skip-btn:hover{border-color:var(--accent-light);color:var(--accent);background:var(--accent-pale)}
.skip-btn:active{transform:scale(0.92)}
.player-scrub-row.active .skip-btn{border-color:var(--accent);color:var(--accent)}
.player-scrub-row.active .skip-btn:hover{background:var(--accent);color:#fff}
.scrub-time{font-size:0.75rem;color:var(--muted);white-space:nowrap;min-width:34px;transition:color 0.3s;font-variant-numeric:tabular-nums;font-weight:500}
.scrub-time.right{text-align:right}
.player-scrub-row.active .scrub-time{color:var(--accent);font-weight:600}
.scrub-track{flex:1;height:6px;background:var(--warm);border-radius:3px;cursor:pointer;position:relative;overflow:visible;transition:background var(--transition)}
.player-scrub-row.active .scrub-track{height:7px;background:rgba(139,69,19,0.15)}
html.dark .player-scrub-row.active .scrub-track{background:rgba(196,122,58,0.18)}
.scrub-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;pointer-events:none;transition:width 0.25s linear}
.scrub-thumb{position:absolute;top:50%;left:0%;transform:translateY(-50%) translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 1px 4px rgba(139,69,19,0.4);pointer-events:none;opacity:0;transition:opacity 0.15s}
.scrub-track:hover .scrub-thumb,.scrub-track.dragging .scrub-thumb{opacity:1}
.player-scrub-row.active .scrub-thumb{opacity:1}
.summary-actions{padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--warm);display:flex;gap:10px;flex-wrap:wrap;align-items:center;transition:background var(--transition),border-color var(--transition)}
.summary-body{padding:2rem 2.5rem;font-family:'DM Sans',sans-serif;font-size:1rem;line-height:1.9;color:var(--ink);transition:color var(--transition)}
.summary-body h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:var(--accent);margin:2rem 0 0.75rem;padding-bottom:8px;border-bottom:1px solid var(--border);transition:color var(--transition),border-color var(--transition)}
.summary-body h2:first-child{margin-top:0}
.summary-body p{margin-bottom:1.1rem}
.summary-body p:last-child{margin-bottom:0}
.disclaimer-bar{padding:1rem 2rem;border-top:1px solid var(--border);background:var(--warm);transition:background var(--transition),border-color var(--transition)}
.disclaimer-text{font-size:0.78rem;color:var(--muted);line-height:1.5;font-style:italic}
.buy-btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 18px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;text-decoration:none;white-space:nowrap;transition:background 0.2s;border:none;cursor:pointer}
.buy-btn:hover{background:var(--accent-light)}
.megan-words-section{border-top:1px solid var(--border);transition:border-color var(--transition)}
.megan-words-header{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--warm);transition:background var(--transition)}
.megan-words-header:hover{background:var(--accent-pale)}
.megan-words-title{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--accent)}
.megan-words-subtitle{font-size:0.75rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;font-style:italic;margin-left:4px}
.megan-arrow{font-size:0.75rem;color:var(--muted);transition:transform 0.3s ease}
.megan-words-grid{display:none;padding:1.5rem 2rem 2rem;grid-template-columns:repeat(3,1fr);gap:12px;background:var(--card);transition:background var(--transition)}
@media(max-width:700px){.megan-words-grid{grid-template-columns:repeat(2,1fr);padding:1rem 1rem 1.5rem;gap:10px}}
@media(max-width:400px){.megan-words-grid{grid-template-columns:1fr}}
.megan-words-grid.open{display:grid}
.megan-word-item{background:var(--warm);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.9rem 1.1rem;transition:all var(--transition)}
@media(max-width:700px){.megan-word-item{padding:0.75rem 0.9rem}}
.megan-word-item:hover{border-color:var(--accent-light);transform:translateY(-1px)}
.megan-word{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:4px}
.megan-definition{font-size:0.82rem;color:var(--muted);line-height:1.5}
.summary-footer{padding:1rem 2rem;border-top:1px solid var(--border);background:var(--warm);display:flex;justify-content:flex-end;transition:background var(--transition),border-color var(--transition)}
.btn-action{height:38px;padding:0 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-action:hover{border-color:var(--accent-light);color:var(--accent);background:var(--warm)}
@media(max-width:560px){
  body{overflow-x:hidden}
  #app{padding:0 0 5rem}
  .masthead{padding:1.5rem 1rem 1.25rem;margin-bottom:1rem}
  .summary-card{border-radius:0;border-left:none;border-right:none;box-shadow:none;margin-bottom:0}
  .summary-header{padding:1.25rem 1rem 1rem}
  .summary-header-ornament{font-size:3rem;top:0.5rem;right:0.75rem}
  .player{padding:0.75rem 1rem}
  .player-top{margin-bottom:8px}
  .summary-actions{padding:0.75rem 1rem}
  .summary-body{padding:1.25rem 1rem}
  .disclaimer-bar{padding:0.75rem 1rem}
  .megan-words-header{padding:0.75rem 1rem}
  .summary-footer{padding:0.75rem 1rem}
  .btn-action{font-size:0.78rem;padding:0 12px}
  .player-scrub-row{padding:8px 6px}
  .summary-title-row{flex-wrap:wrap;gap:0.5rem}
}
</style>
</head>
<body>
<div id="app">
  <div class="masthead">
    <a class="back-link" href="/library.html">&#8592; Library</a>
    <button class="dark-toggle" onclick="toggleDark()">
      <span id="dark-icon">&#127769;</span>
      <span id="dark-label">Dark</span>
    </button>
    <div class="logo">K<span class="logo-e">E</span>RNL</div>
    <div class="tagline">for the curious</div>
  </div>
  <div id="content">
    <div class="loading-card">
      <div class="spinner"></div>
      Loading summary...
    </div>
  </div>
</div>
<script>
const AMAZON_TAG = 'kernl-21';

let currentSummary = null;
let audioEl = null;
let isPlaying = false;
let playbackRate = 1;
let currentVoice = 'female';
let loadedVoice = 'female';
let prefetchedAudioUrl = null;
let prefetchedBlobUrl = null;
let currentTimings = [];

function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('kernl_dark', isDark ? '1' : '0');
  document.getElementById('dark-icon').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
  document.getElementById('dark-label').textContent = isDark ? 'Light' : 'Dark';
}
function initDark() {
  const saved = localStorage.getItem('kernl_dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved !== null ? saved === '1' : prefersDark;
  if (isDark) {
    document.documentElement.classList.add('dark');
    document.getElementById('dark-icon').textContent = '\u2600\uFE0F';
    document.getElementById('dark-label').textContent = 'Light';
  }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function safe(s) { return String(s).replace(/[^a-z0-9]/gi,'_').replace(/_+/g,'_').slice(0,60); }
function countWords(plain) { return plain.split(/\s+/).filter(w=>w.length>0).length; }
function makeAmazonUrl(title,author) {
  return 'https://www.amazon.co.uk/s?k=' + encodeURIComponent(title+(author?' '+author:'')) + '&tag=' + AMAZON_TAG;
}

function setSpeed(rate) {
  playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(function(btn) {
    btn.classList.toggle('active', parseFloat(btn.dataset.rate) === rate);
  });
  if (audioEl) audioEl.playbackRate = rate;
}

function fmtTime(secs) {
  if (!isFinite(secs) || secs < 0) secs = 0;
  var m = Math.floor(secs/60), s = Math.floor(secs%60);
  return m + ':' + String(s).padStart(2,'0');
}

function setScrubActive(active) {
  var row = document.getElementById('scrub-row');
  var btn = document.getElementById('play-btn-el');
  var sub = document.getElementById('player-sub');
  if (row) row.classList.toggle('active', active);
  if (btn) btn.classList.toggle('playing', active);
  if (sub) sub.classList.toggle('playing', active);
}

function resetScrubUI() {
  var fill = document.getElementById('scrub-fill');
  var thumb = document.getElementById('scrub-thumb');
  if (fill) fill.style.width = '0%';
  if (thumb) thumb.style.left = '0%';
  var el = document.getElementById('scrub-elapsed');
  var re = document.getElementById('scrub-remaining');
  if (el) el.textContent = '0:00';
  if (re) re.textContent = '\u22120:00';
  setScrubActive(false);
}

function updateScrubUI() {
  if (!audioEl || !audioEl.duration) return;
  var pct = (audioEl.currentTime / audioEl.duration) * 100;
  var fill = document.getElementById('scrub-fill');
  var thumb = document.getElementById('scrub-thumb');
  if (fill) fill.style.width = pct + '%';
  if (thumb) thumb.style.left = pct + '%';
  var el = document.getElementById('scrub-elapsed');
  var re = document.getElementById('scrub-remaining');
  if (el) el.textContent = fmtTime(audioEl.currentTime);
  if (re) re.textContent = '\u2212' + fmtTime(audioEl.duration - audioEl.currentTime);
}

function initScrubEvents() {
  var track = document.getElementById('scrub-track');
  if (!track || track._scrubInit) return;
  track._scrubInit = true;
  var dragging = false;
  function seekTo(e) {
    if (!audioEl || !audioEl.duration) return;
    var rect = track.getBoundingClientRect();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    audioEl.currentTime = pct * audioEl.duration;
    updateScrubUI();
  }
  track.addEventListener('mousedown', function(e) { dragging = true; track.classList.add('dragging'); seekTo(e); });
  track.addEventListener('touchstart', function(e) { dragging = true; track.classList.add('dragging'); seekTo(e); }, {passive:true});
  document.addEventListener('mousemove', function(e) { if (dragging) seekTo(e); });
  document.addEventListener('touchmove', function(e) { if (dragging) seekTo(e); }, {passive:true});
  document.addEventListener('mouseup', function() { dragging = false; track.classList.remove('dragging'); });
  document.addEventListener('touchend', function() { dragging = false; track.classList.remove('dragging'); });
}

function skipAudio(secs) {
  if (!audioEl) return;
  audioEl.currentTime = Math.max(0, Math.min(audioEl.duration||0, audioEl.currentTime + secs));
  updateScrubUI();
}

function setPlayerState(playing, sub) {
  isPlaying = playing;
  var icon = document.getElementById('play-icon');
  if (!icon) return;
  icon.innerHTML = playing
    ? '<rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/>'
    : '<polygon points="6,3 20,12 6,21"/>';
  if (sub) { var ps = document.getElementById('player-sub'); if(ps) ps.textContent = sub; }
  setScrubActive(playing);
}

function stopAudio() {
  if (audioEl) { audioEl.pause(); audioEl.src=''; audioEl=null; }
  isPlaying = false;
  setPlayerState(false, null);
  resetScrubUI();
}
function pauseAudio() {
  if (audioEl && !audioEl.paused) audioEl.pause();
  setPlayerState(false, 'Paused \u2014 press play to continue');
  setScrubActive(false);
}
function resumeAudio() {
  if (audioEl && audioEl.paused) {
    var p = audioEl.play();
    if (p && p.catch) p.catch(function(){});
    loadedVoice = currentVoice; setPlayerState(true, (currentVoice === 'male' ? 'Male' : 'Female') + ' voice - now playing');
    setScrubActive(true);
    return true;
  }
  return false;
}

async function prefetchAudio() {
  if (!currentSummary) return;
  try {
    var res = await fetch('/api/tts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text:currentSummary.plain, voice:currentVoice, title:currentSummary.title, author:currentSummary.author})
    });
    if (!res.ok) return;
    var ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      var data = await res.json();
      prefetchedAudioUrl = data.url; prefetchedBlobUrl = null;
      if (data.timings && data.timings.length) currentTimings = data.timings;
    } else {
      var blob = await res.blob();
      prefetchedBlobUrl = URL.createObjectURL(blob);
      prefetchedAudioUrl = prefetchedBlobUrl;
    }
  } catch(e) { prefetchedAudioUrl = null; }
}

async function startOpenAIAudio() {
  if (!currentSummary) return;
  setPlayerState(true, 'Loading audio\u2026');
  var audioUrl = prefetchedAudioUrl;
  var blobUrl = prefetchedBlobUrl;
  if (!audioUrl) {
    try {
      var res = await fetch('/api/tts', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({text:currentSummary.plain, voice:currentVoice, title:currentSummary.title, author:currentSummary.author})
      });
      if (!res.ok) throw new Error('TTS failed');
      var ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json')) { var data = await res.json(); audioUrl = data.url; if (data.timings && data.timings.length) currentTimings = data.timings; }
      else { var blob = await res.blob(); blobUrl = URL.createObjectURL(blob); audioUrl = blobUrl; }
    } catch(err) { setPlayerState(false, 'Audio unavailable \u2014 please try again'); return; }
  }
  prefetchedAudioUrl = null; prefetchedBlobUrl = null;
  audioEl = new Audio(audioUrl);
  audioEl.playbackRate = playbackRate;
  audioEl.addEventListener('timeupdate', updateScrubUI);
  audioEl.addEventListener('ended', function() {
    var fill = document.getElementById('scrub-fill');
    if (fill) fill.style.width = '100%';
    setPlayerState(false, 'Finished \u2014 press play to replay');
    setScrubActive(false);
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    audioEl = null;
    prefetchAudio();
  });
  audioEl.addEventListener('error', function() {
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    audioEl = null;
    setPlayerState(false, 'Audio unavailable \u2014 please try again');
    setScrubActive(false);
  });
  var playPromise = audioEl.play();
  if (playPromise && playPromise.catch) {
    playPromise.catch(function(err) { console.warn('Play blocked:', err); setPlayerState(false, 'Tap play to listen'); });
  }
  loadedVoice = currentVoice; setPlayerState(true, (currentVoice === 'male' ? 'Male' : 'Female') + ' voice - now playing');
  setScrubActive(true);
  initScrubEvents();
}

function togglePlay() {
  if (!currentSummary) return;
  if (isPlaying) { pauseAudio(); return; }
  if (audioEl && audioEl.paused && audioEl.src && loadedVoice === currentVoice) { resumeAudio(); return; }
  if (audioEl && loadedVoice !== currentVoice) { stopAudio(); }
  startOpenAIAudio();
}

  var opf='<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bid" version="2.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>'+t+' \u2014 KERNL</dc:title><dc:creator>'+a+'</dc:creator><dc:language>en</dc:language><dc:identifier id="bid">'+id+'</dc:identifier></metadata><manifest><item id="c" href="content.html" media-type="application/xhtml+xml"/><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/></manifest><spine toc="ncx"><itemref idref="c"/></spine></package>';
  var ncx='<?xml version="1.0"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="'+id+'"/></head><docTitle><text>'+t+'</text></docTitle><navMap><navPoint id="n1" playOrder="1"><navLabel><text>Summary</text></navLabel><content src="content.html"/></navPoint></navMap></ncx>';
  var container='<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';
  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  script.onload=function(){
    var zip=new JSZip(); zip.file('mimetype','application/epub+zip');
    zip.folder('META-INF').file('container.xml',container);
    var oebps=zip.folder('OEBPS');
    oebps.file('content.opf',opf);oebps.file('toc.ncx',ncx);oebps.file('content.html',contentHtml);
    zip.generateAsync({type:'blob',mimeType:'application/epub+zip'}).then(function(blob){triggerDownload(blob,safe(currentSummary.title)+'_KERNL.epub');});
  };
  document.head.appendChild(script);
}

function printSummary() {
  if (!currentSummary) return;
  var meganGrid=document.getElementById('megan-words-grid');
  var meganOpen=meganGrid&&meganGrid.classList.contains('open');
  var words=currentSummary.words||[];
  var meganSection='';
  if (meganOpen&&words.length) {
    var wordRows=words.map(function(w){return '<tr><td style="font-weight:bold;color:#8B4513;padding:5pt 10pt 5pt 0;vertical-align:top;width:120pt">'+esc(w.word)+'</td><td style="padding:5pt 0;color:#444;line-height:1.5">'+esc(w.definition)+'</td></tr>';}).join('');
    meganSection='<div style="margin-top:2em;border-top:1pt solid #ddd;padding-top:1em"><h2 style="font-size:13pt;font-weight:bold;color:#8B4513;margin-bottom:0.75em">Mega Words</h2><table style="width:100%;border-collapse:collapse;font-family:Georgia,serif;font-size:10pt">'+wordRows+'</table></div>';
  }
  var w=window.open('','_blank');

  w.document.close(); setTimeout(function(){w.print();},400);
}

function triggerDownload(blob,filename){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);}

function renderMeganWords(words) {
  var section=document.getElementById('megan-words-section');
  if(!words||!words.length){section.style.display='none';return;}
  var seen=new Set();
  var unique=words.filter(function(w){var k=w.word.toLowerCase().trim();if(seen.has(k))return false;seen.add(k);return true;});
  section.style.display='block';
  document.getElementById('megan-words-grid').innerHTML=unique.map(function(w){return '<div class="megan-word-item"><div class="megan-word">'+esc(w.word)+'</div><div class="megan-definition">'+esc(w.definition)+'</div></div>';}).join('');
}

async function loadSummary() {
  var params = new URLSearchParams(window.location.search);
  var title = params.get('title');
  var voiceParam = params.get('voice');
  if (voiceParam === 'male') { currentVoice = 'male'; }
  var author = params.get('author');
  if (!title) { document.getElementById('content').innerHTML = '<div class="loading-card">No book specified. <a href="/library.html">&#8592; Back to Library</a></div>'; return; }
  document.title = 'KERNL \u2014 ' + title;
  try {
    var url = '/api/get-summary?title=' + encodeURIComponent(title);
    if (author) url += '&author=' + encodeURIComponent(author);
    var res = await fetch(url);
    if (!res.ok) throw new Error('Not found');
    var data = await res.json();
    var words = [];
    try { words = data.words ? (typeof data.words === 'string' ? JSON.parse(data.words) : data.words) : []; } catch(e) {}
    renderSummary({title:title, author:author||data.author||'', html:data.html, plain:data.plain, words:words});
  } catch(err) {
    document.getElementById('content').innerHTML='<div class="loading-card">Could not load summary. <a href="/library.html">&#8592; Back to Library</a></div>';
  }
}

function openSwift() {
  if (!currentSummary || !currentSummary.plain) return;
  var wpmMap = {1: 250, 1.5: 375, 2: 500};
  var wpm = wpmMap[playbackRate] || 250;
  KernlSwift.open(
    currentSummary.plain,
    wpm,
    function() { return audioEl; },
    function() { togglePlay(); },
    function() { pauseAudio(); },
    currentTimings
  );
}

function setVoiceLib(v) {
  currentVoice = v;
  var pvf = document.getElementById('pvf');
  var pvm = document.getElementById('pvm');
  if (pvf) { pvf.classList.toggle('on', v === 'female'); pvf.classList.toggle('active', v === 'female'); }
  if (pvm) { pvm.classList.toggle('on', v === 'male'); pvm.classList.toggle('active', v === 'male'); }
  if (audioEl) { audioEl.pause(); audioEl.src = ''; audioEl = null; }
  isPlaying = false;
  prefetchedAudioUrl = null;
  prefetchedBlobUrl = null;
  setPlayerState(false, null);
  resetScrubUI();
  var ps = document.getElementById('player-sub');
  if (ps) ps.textContent = (v === 'male' ? 'Male' : 'Female') + ' voice - press play';
  prefetchAudio();
}
