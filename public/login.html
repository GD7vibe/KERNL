<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERNL &mdash; Sign In</title>
<meta name="description" content="Sign in to KERNL &mdash; AI-powered book summaries.">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KERNL">
<meta name="theme-color" content="#1a1714">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--paper:#faf8f4;--warm:#f0ebe0;--accent:#8B4513;--accent-light:#c47a3a;--accent-pale:rgba(139,69,19,0.08);--muted:#7a7060;--border:rgba(139,69,19,0.14);--card:#ffffff;--error-bg:#fdf0f0;--error-fg:#8B1A1A;--success-bg:#e8f5ee;--success-fg:#2d6a4f;--radius:12px;--radius-sm:8px;--transition:0.3s ease}
html.dark{--ink:#e8e0d5;--paper:#1a1714;--warm:#242019;--accent:#c47a3a;--accent-light:#d4924f;--accent-pale:rgba(196,122,58,0.12);--muted:#9a8f80;--border:rgba(196,122,58,0.2);--card:#221f1a;--error-bg:#2e1a1a;--error-fg:#d4706f;--success-bg:#1a2e22;--success-fg:#5aab7a}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition)}
.wrap{width:100%;max-width:420px}
.masthead{text-align:center;margin-bottom:2rem}
.logo{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:600;letter-spacing:0.12em;color:var(--ink);line-height:1}
.logo-e{color:var(--accent)}
.tagline{font-size:0.82rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:0.4rem;font-weight:500}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:0 4px 24px rgba(139,69,19,0.08)}
.tabs{display:flex;gap:0;margin-bottom:1.75rem;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:0.6rem;background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;margin-bottom:-1px;letter-spacing:0.04em}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--ink)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input{width:100%;height:44px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--paper);font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.field input:focus{border-color:var(--accent-light);box-shadow:0 0 0 3px rgba(196,122,58,0.1)}
.field input::placeholder{color:var(--muted);opacity:0.6}
.btn{width:100%;height:46px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s,box-shadow 0.2s;box-shadow:0 2px 8px rgba(139,69,19,0.25);margin-top:0.5rem}
.btn:hover:not(:disabled){background:var(--accent-light)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{padding:0.75rem 1rem;border-radius:var(--radius-sm);font-size:0.85rem;margin-top:1rem;display:none;line-height:1.5}
.msg.error{background:var(--error-bg);color:var(--error-fg);border:1px solid rgba(139,26,26,0.15);display:block}
.msg.success{background:var(--success-bg);color:var(--success-fg);border:1px solid rgba(45,106,79,0.2);display:block}
.forgot{text-align:right;margin-top:-0.5rem;margin-bottom:1rem}
.forgot a{font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color 0.2s}
.forgot a:hover{color:var(--accent)}
.divider{text-align:center;font-size:0.75rem;color:var(--muted);margin:1.25rem 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:calc(50% - 1.5rem);height:1px;background:var(--border)}
.divider::before{left:0}
.divider::after{right:0}
.terms{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:1.25rem;line-height:1.6}
.terms a{color:var(--accent);text-decoration:none}
.terms a:hover{text-decoration:underline}
.back-link{text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--muted)}
.back-link a{color:var(--accent);text-decoration:none;font-weight:500}
.back-link a:hover{text-decoration:underline}
.panel{display:none}
.panel.active{display:block}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="logo">K<span class="logo-e">E</span>RNL</div>
    <div class="tagline">for the curious</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="showPanel('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="showPanel('signup')">Create Account</button>
      <button class="tab" id="tab-forgot" onclick="showPanel('forgot')" style="display:none">Reset Password</button>
    </div>

    <!-- Sign In -->
    <div class="panel active" id="panel-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password" />
      </div>
      <div class="forgot"><a href="#" onclick="showPanel('forgot');return false;">Forgot password?</a></div>
      <button class="btn" id="signin-btn" onclick="handleSignIn()">Sign In &rsaquo;</button>
      <div class="msg" id="signin-msg"></div>
    </div>

    <!-- Sign Up -->
    <div class="panel" id="panel-signup">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="Repeat password" autocomplete="new-password" />
      </div>
      <button class="btn" id="signup-btn" onclick="handleSignUp()">Create Account &rsaquo;</button>
      <div class="msg" id="signup-msg"></div>
      <div class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</div>
    </div>

    <!-- Forgot Password -->
    <div class="panel" id="panel-forgot">
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6">Enter your email and we'll send you a link to reset your password.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn" id="forgot-btn" onclick="handleForgot()">Send Reset Link &rsaquo;</button>
      <div class="msg" id="forgot-msg"></div>
      <div style="text-align:center;margin-top:1rem">
        <a href="#" onclick="showPanel('signin');return false;" style="font-size:0.8rem;color:var(--muted);text-decoration:none">&larr; Back to sign in</a>
      </div>
    </div>
  </div>
  <div class="back-link"><a href="/">&larr; Back to KERNL</a></div>
</div>

<script>
const SUPABASE_URL = 'https://peebgzfufyklxzdfnesc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZWJnemZ1ZnlrbHh6ZGZuZXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwNDEsImV4cCI6MjA5MDY5ODA0MX0.TXg5ztQsoGvE5j49GRRtaNdTIVM2jS1-LmMNzu7YA5g';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Dark mode
(function(){
  const saved = localStorage.getItem('kernl_dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === '1' || (saved === null && prefersDark)) document.documentElement.classList.add('dark');
})();

// If already logged in, redirect
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/';
});

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const tabEl = document.getElementById('tab-' + name);
  if (tabEl) tabEl.classList.add('active');
  // Show forgot tab when on forgot panel
  document.getElementById('tab-forgot').style.display = name === 'forgot' ? '' : 'none';
}

function setMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

function setLoading(btnId, loading, defaultText) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Please wait\u2026' : defaultText;
}

async function handleSignIn() {
  const email = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) { setMsg('signin-msg', 'error', 'Please enter your email and password.'); return; }
  setLoading('signin-btn', true, 'Sign In &rsaquo;');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('signin-btn', false, 'Sign In &rsaquo;');
  if (error) { setMsg('signin-msg', 'error', error.message); return; }
  window.location.href = '/app.html';
}

async function handleSignUp() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !password) { setMsg('signup-msg', 'error', 'Please fill in all fields.'); return; }
  if (password.length < 8) { setMsg('signup-msg', 'error', 'Password must be at least 8 characters.'); return; }
  if (password !== confirm) { setMsg('signup-msg', 'error', 'Passwords do not match.'); return; }
  setLoading('signup-btn', true, 'Create Account &rsaquo;');
  const { error } = await sb.auth.signUp({ email, password });
  setLoading('signup-btn', false, 'Create Account &rsaquo;');
  if (error) { setMsg('signup-msg', 'error', error.message); return; }
  setMsg('signup-msg', 'success', 'Account created! Check your email to confirm your address, then sign in.');
}

async function handleForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { setMsg('forgot-msg', 'error', 'Please enter your email address.'); return; }
  setLoading('forgot-btn', true, 'Send Reset Link &rsaquo;');
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
  setLoading('forgot-btn', false, 'Send Reset Link &rsaquo;');
  if (error) { setMsg('forgot-msg', 'error', error.message); return; }
  setMsg('forgot-msg', 'success', 'Reset link sent — check your email.');
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.panel.active').id;
  if (active === 'panel-signin') handleSignIn();
  else if (active === 'panel-signup') handleSignUp();
  else if (active === 'panel-forgot') handleForgot();
});
</script>
</body>
</html>
